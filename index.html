<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emlak Vergisi</title>

<!-- PDF & JPG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#eee;
  margin:0;
}

.controls{
  padding:10px;
  background:white;
  position:sticky;
  top:0;
  z-index:10;
}

#evrak{
  width:210mm;
  min-height:297mm;
  background:white;
  margin:20px auto;
  padding:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo, .qr{
  width:80px;
}

.title{
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.row{
  display:flex;
  margin-top:10px;
}

.box{
  border:1px solid black;
  padding:5px;
  flex:1;
  margin-right:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td{
  border:1px solid black;
  padding:5px;
  font-size:12px;
}

.footer{
  margin-top:30px;
}
</style>

</head>
<body>

<div class="controls">
  <input placeholder="Ad" oninput="setText('ad', this.value)">
  <input placeholder="Soyad" oninput="setText('soyad', this.value)">
  <input placeholder="TC" oninput="setText('tc', this.value)">
  
  <button onclick="downloadPDF()">PDF indir</button>
  <button onclick="downloadJPG()">JPG indir</button>
</div>

<div id="evrak">

  <div class="header">
    <img src="logo.png" class="logo">
    <div class="title">
      EMLAK VERGİSİ BİLDİRİMİ<br>
      MESKEN / BİNA
    </div>
    <img src="qr.png" class="qr">
  </div>

  <div class="row">
    <div class="box">ANTAKYA BELEDİYESİ</div>
    <div class="box">Yılı: 2026</div>
  </div>

  <div class="row">
    <div class="box">Vergi Kimlik No: <span id="tc">-</span></div>
  </div>

  <div class="row">
    <div class="box">Ad: <span id="ad">-</span></div>
    <div class="box">Soyad: <span id="soyad">-</span></div>
  </div>

  <table>
    <tr>
      <th>Bilgi</th>
      <th>1. Bina</th>
      <th>2. Bina</th>
    </tr>

    <tr>
      <td>Mahalle</td>
      <td contenteditable="true">-</td>
      <td contenteditable="true">-</td>
    </tr>

    <tr>
      <td>Cadde</td>
      <td contenteditable="true">-</td>
      <td contenteditable="true">-</td>
    </tr>

    <tr>
      <td>Alan (m²)</td>
      <td contenteditable="true">720,55</td>
      <td contenteditable="true">720,55</td>
    </tr>

    <tr>
      <td>Vergi Değeri</td>
      <td contenteditable="true">361.000</td>
      <td contenteditable="true">361.000</td>
    </tr>

  </table>

  <div class="footer">
    Düzenleyen: ALİYE AKINCI
  </div>

</div>

<script>
function setText(id, value){
  document.getElementById(id).innerText = value || "-";
}

function downloadPDF(){
  const element = document.getElementById("evrak");

  html2pdf().set({
    margin: 0,
    filename: 'evrak.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 3 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(element).save();
}

function downloadJPG(){
  html2canvas(document.getElementById("evrak"), { scale: 3 }).then(canvas => {
    let link = document.createElement('a');
    link.download = 'evrak.jpg';
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
