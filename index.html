<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f0f2f5;
}

/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: #fff;
    position: relative;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 85px; 
    font-size: 16px;
    font-weight: 500;
}

/* LOGO KONUMU - DOKUNULMADI */
.logo-img {
    position: absolute;
    top: -35px;
    left: 0;
    height: 78px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.ed-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

/* ANA YAPI */
.main {
    display: flex;
}

/* SOL MENÜ (GÖRSEL ALANI) */
.sidebar {
    width: 250px;
    background: #fff;
    height: calc(100vh - 70px);
    border-right: 1px solid #ddd;
    overflow: hidden; /* Taşmaları önler */
}

.sidebar-img {
    width: 90%;    /* Menü görselini genişliğe tam yayar */
/* YUKARI - AŞAĞI AYARI */
    top: -10px;    /* Eksi (-) yukarı çeker, artı (+) aşağı indirir */

    /* SAĞ - SOL AYARI */
    left: 5px;
}

/* İÇERİK ALANI */
.content {
    flex: 1;
    padding: 20px 30px;
}

.page-title {
    font-size: 15px;
    color: #888;
    margin-bottom: 15px;
    font-weight: 600;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    padding: 20px;
    min-height: 80vh;
}

.new-btn {
    background: #17a2b8;
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

.footer {
    position: fixed;
    bottom: 5px;
    right: 15px;
    font-size: 11px;
    color: #999;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        SAMANDAĞ BELEDİYESİ <span style="margin-left:10px; font-weight:300; opacity:0.9;">E-HİZMET SAYFASI</span>
    </div>

    <div class="header-right">
        <button class="ed-btn">e-Devlet ile Giriş Yap</button>
        <span style="font-size: 13px; cursor:pointer; font-weight:600;">➔ ÜYE GİRİŞİ</span>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <button class="new-btn">✚ Yeni Sorgu</button>
            <div style="margin-top:20px; border:1px solid #eee; height:500px; background:#fcfcfc;"></div>
        </div>
    </div>
</div>

<div class="footer">SÜRÜM 2.0.888</div>

</body>
</html>
