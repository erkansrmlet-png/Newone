<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    /* Logoların toplam genişliğine göre burayı 240px yaptım */
    padding-left: 240px; 
    font-size: 16px;
    font-weight: 500;
    height: 70px;
}

/* ANA LOGO (En Solda) */
.logo-img {
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
    z-index: 105; /* En üstte */
}

/* ARKA LOGO (Ana logonun hemen sağında, görünür halde) */
.arkalogo-img {
    position: absolute;
    top: -27px;
    /* logo.png'nin bitişine göre sağa kaydırdım */
    left: 110px; 
    height: 78px;
    z-index: 100; 
    display: block !important;
    width: auto;
}

/* MOBİL İÇİN LOGO 3 */
.logo3-img { 
    display: none; 
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.extra-logos-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.extra-logos-right img {
    height: 35px; 
    width: auto;
    cursor: pointer;
}

/* MOBİL MENÜ BUTONU */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.7); 
    border-radius: 2px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
}

.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; }

.page-title {
    font-size: 18px; 
    color: #6c757d; 
    text-transform: uppercase;
    margin-bottom: 10px;
}

.card {
    background: #fff;
    border-radius: 4px;
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    box-sizing: border-box; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    margin: 15px -20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
}

/* --- MEDYA SORGULARI --- */
@media (max-width: 1000px) {
    .logo-img, .arkalogo-img, .sidebar, .extra-logos-right {
        display: none !important;
    }
    .logo3-img { display: block !important; }
    .logo-area { padding-left: 80px; }
    .mobile-menu-btn { display: flex !important; }
    .main { flex-direction: column; padding: 10px; }
}

@media (max-width: 600px) {
    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; text-align: center; padding: 40px 0; }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="arkalogo.png" class="arkalogo-img">
        <img src="logo3.png" class="logo3-img">
        
        <span>SAMANDAĞ BELEDİYESİ</span>
    </div>

    <div class="header-right">
        <div class="extra-logos-right">
            <img src="edevlet.png" alt="E-Devlet">
            <img src="uyegirisi.png" alt="Üye Girişi">
        </div>
        
        <div class="mobile-menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" style="width:110px; cursor:pointer;">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>

            <div class="mobile-pdf-warning" style="display:none;">
                This browser does not support inline PDFs. <a href="Evrak.pdf">Download PDF</a>
            </div>
        </div>
    </div>
</div>

<div class="footer" style="position:fixed; bottom:5px; right:15px; font-size:11px; color:#999;">SÜRÜM 2.0.888</div>

</body>
</html>
