<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    /* Yazının logolardan çok sonra başlaması için boşluk */
    padding-left: 280px; 
    font-size: 16px;
    font-weight: 500;
    flex-grow: 1; /* Alanı genişleterek logonun sağa gitmesine izin verir */
}

/* ANA LOGO (PİN) */
.logo-img, .logo3-img {
    position: absolute;
    top: -30px;
    left: -20px;
    height: 88px;
    z-index: 100;
}

/* ARKA LOGO */
.arkalogo-img {
    position: absolute;
    top: -30px;
    left: 1250px; 
    height: 88px;
    width: auto;
    z-index: 999; 
    display: block !important;
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    /* logo2 kaldırıldığı için sağ padding ayarlandı */
    padding-right: 10px; 
}

/* YENİ EKLENEN İKONLAR */
.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 1002;
}

.header-icons img {
    height: 25px; /* İkon yüksekliği */
    width: auto;
    cursor: pointer;
}

/* MOBİL MENÜ BUTONU */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    position: absolute; 
    right: 15px;
    top: 22px;          
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

.ed-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start; 
}

.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    text-transform: uppercase;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    width: 97%;   
    box-sizing: border-box; 
}

.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    position: relative;
    top: -7.8px; 
    margin-bottom: 5px; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* --- MEDYA SORGULARI --- */
@media (max-width: 1000px) {
    .logo-img, .arkalogo-img, .header-right, .header-icons {
        display: none !important;
    }
    .logo3-img { display: block !important; }
    .sidebar { width: 100%; max-height: 0; box-shadow: none; }
    .sidebar.open { max-height: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .mobile-menu-btn { display: flex !important; }
    .main { padding: 10px; flex-direction: column; }
    .card { width: 100%; }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="arkalogo.png" class="arkalogo-img">
        <img src="logo3.png" class="logo3-img">
        SAMANDAĞ BELEDİYESİ
    </div>

    <div class="header-right">
        <button class="ed-btn">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600; white-space: nowrap;">➔ ÜYE GİRİŞİ</span>
        
        <div class="header-icons">
            <img src="edevlet.png" alt="e-Devlet">
            <img src="uyegirisi.png" alt="Üye Girişi">
        </div>
    </div>

    <div class="mobile-menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div class="main">
    <div class="sidebar" id="mobileSidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" class="y-buton-img">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>
        </div>
    </div>
</div>

<div class="footer" style="position: fixed; bottom: 5px; right: 15px; font-size: 11px; color: #999;">SÜRÜM 2.0.888</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById('mobileSidebar');
    sidebar.classList.toggle('open');
}
</script>

</body>
</html>
