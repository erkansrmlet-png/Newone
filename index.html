<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
    overflow: hidden; 
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 85px; 
    font-size: 16px;
    font-weight: 500;
}

.logo-img, .logo3-img {
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
    z-index: 1;
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 15px;
    padding-right: 10px;
}

/* SAĞA YASLANAN İKONLAR */
.extra-logos-right {
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1002;
}

.extra-logos-right img {
    height: 35px; 
    width: auto;
    cursor: pointer;
}

/* MOBİL MENÜ BUTONU */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start; 
}

.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    letter-spacing: 0.15px; 
    margin-top: 8.5px; 
    margin-left: -6px; 
    text-transform: uppercase;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    margin-top: 8px; 
    margin-left: -7px; 
    width: 97%;   
    box-sizing: border-box; 
}

.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    position: relative;
    top: -7.8px; 
    left: 1px; 
    margin-bottom: 5px; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

.mobile-pdf-warning {
    display: none;
    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: #333;
    padding: 20px 0;
}

.mobile-pdf-warning a {
    color: #337ab7;
    text-decoration: none;
}

.footer {
    position: fixed;
    bottom: 5px;
    right: 15px;
    font-size: 11px;
    color: #999;
}

/* --- 1000PX MEDYA SORGUSU --- */
@media (max-width: 1000px) {
    .logo-img, .sidebar, .header-right .extra-logos-right {
        display: none !important;
    }
    .logo3-img { display: block !important; }
    .mobile-menu-btn { display: flex !important; }
    .main { padding: 10px; }
    .card { width: 100%; margin-left: 0; padding: 15px; }
    .pdf-container { height: 75vh; }
}

/* --- 600PX MEDYA SORGUSU --- */
@media (max-width: 600px) {
    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; }
    .card { min-height: auto; }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="logo3.png" class="logo3-img">
        <span>SAMANDAĞ BELEDİYESİ</span>
    </div>

    <div class="header-right">
        <div class="extra-logos-right">
            <img src="edevlet.png" alt="E-Devlet">
            <img src="uyegirisi.png" alt="Üye Girişi">
        </div>
        
        <div class="mobile-menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" class="y-buton-img">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>

            <div class="mobile-pdf-warning">
                This browser does not support inline PDFs. Please download the PDF to view it: <a href="Evrak.pdf" target="_blank">Download PDF</a>
            </div>
        </div>
    </div>
</div>

<div class="footer">SÜRÜM 2.0.888</div>

</body>
</html>
