<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    /* İki logo sığacağı için yazı boşluğunu artırdık */
    padding-left: 145px; 
    font-size: 16px;
    font-weight: 500;
}

/* ANA LOGO */
.logo-img, .logo3-img {
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
    z-index: 2;
}

/* YENİ EKLENEN ARKA LOGO */
.arkalogo-img {
    position: absolute;
    top: -27px;
    /* logo.png'nin bitiminden başlaması için left değeri */
    left: 45px; 
    height: 78px;
    width: auto;
    z-index: 1; /* Ana logonun hafif arkasında/hizasında durması için */
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-right: 180px; 
}

.logo2-img {
    position: absolute; 
    right: 0;           
    top: -1.7px;             
    height: 78px;       
    width: auto;
    z-index: 1001;       
}

/* MOBİL MENÜ BUTONU */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    position: absolute; 
    right: 15px;
    top: 22px;          
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

.ed-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start; 
}

.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    text-transform: uppercase;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    width: 97%;   
    box-sizing: border-box; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* --- 1000PX MEDYA SORGUSU --- */
@media (max-width: 1000px) {
    .logo-img, .arkalogo-img, .logo2-img, .header-right .ed-btn, .header-right span {
        display: none !important;
    }
    
    .logo3-img { display: block !important; }
    
    .sidebar {
        width: 100%;
        max-height: 0;
        margin-bottom: 15px;
    }

    .sidebar.open {
        max-height: 500px;
    }

    .header-right { padding-right: 0; }
    .mobile-menu-btn { display: flex !important; }
    .main { padding: 10px; flex-direction: column; }
    .card { width: 100%; }
}
</style>
</head>

    <div class="logo-area">

        <img src="arkalogo.png" class="arkalogo-img"> <img src="logo3.png" class="logo3-img">
        SAMANDAĞ BELEDİYESİ
    </div>

    <div class="header-right">
        <button class="ed-btn">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600;">➔ ÜYE GİRİŞİ</span>
        <img src="logo2.png" alt="Logo 2" class="logo2-img">
    </div>

    <div class="mobile-menu-btn" onclick="toggleMenu()">

        <span></span>
        <span></span>
    </div>
</div>
