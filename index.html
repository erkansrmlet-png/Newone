<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 280px; 
    font-size: 16px;
    font-weight: 500;
    flex-grow: 1;
}

.logo-img, .logo3-img {
    position: absolute;
    top: -41px;
    left: -20px;
    height: 89px;
    z-index: 100;
}

.arkalogo-img {
    position: absolute;
    top: -30px;
    left: 1250px; 
    height: 88px;
    width: auto;
    z-index: 999; 
    display: block !important;
}

.logo3-img { display: none; }

.uye600-img, .edevlet600-img {
    display: none;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-right: 10px; 
}

.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 1002;
}

.header-icons img {
    height: 25px; 
    width: auto;
    cursor: pointer;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;       
    align-items: flex-start;
}

.sidebar {
    width: 236px; 
    flex-shrink: 0;
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; cursor: pointer; }

/* ALT MENÜ STİLLERİ */
.submenu {
    display: none;
    background-color: #f9f9f9;
}
.submenu img {
    width: 100%;
    display: block;
    cursor: pointer;
}

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    text-transform: uppercase;
    margin-top: 8.5px; 
    margin-left: -6px; 
}

/* KART */
.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    margin-top: 8px; 
    margin-left: -7px; 
    width: calc(97% + 7px);
    max-width: 100%; 
    box-sizing: border-box; 
}

.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    position: relative;
    top: -7.8px; 
    margin-bottom: 5px; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* DOĞRULAMA ALANI */
.verification-area {
    display: none; 
    padding: 40px 0;
    text-align: left;
}

.verification-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.verification-label {
    font-size: 14px;
    color: #333;
}

.verification-label span { color: red; }

.verification-input {
    width: 300px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 2px;
    outline: none;
}

.devam-btn {
    background-color: #79bedb;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 15px;
    cursor: pointer;
    border-radius: 2px;
    margin-left: 115px;
}

/* MOBİL BUTON */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    position: absolute; 
    right: 15px;
    top: 22px;          
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

/* KIZAKLI MENÜ */
.mobile-slide-container {
    display: none;
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    background: #fff;
    z-index: 998;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    overflow-y: auto; 
    max-height: 0;
    transition: max-height 0.4s ease-in-out;
}

.mobile-slide-container.active {
    max-height: 90vh; 
}

.mobile-menu-item { width: 100%; display: block; cursor: pointer; }

/* --- MEDYA SORGULARI --- */

@media (max-width: 1000px) {
    .logo-img, .arkalogo-img { display: none !important; }
    .logo3-img { display: block !important; }
    .sidebar { display: none !important; }
    
    .header-right { 
        display: flex !important; 
        position: absolute !important;
        right: 55px !important; 
        top: 22px !important;
        z-index: 10005 !important; 
        background: transparent !important;
    }
    
    .header-right button, .header-right > span { 
        display: none !important; 
    }

    .header-icons {
        display: flex !important;
        gap: 12px !important;
    }

    .header-icons img {
        display: block !important;
        height: 25px !important;
        width: auto !important;
    }

    .mobile-menu-btn { display: flex; }
    .mobile-slide-container { display: block; }
    
    .main { padding: 10px; }
    .card { width: 100%; margin-left: 0; padding: 15px; }
    .pdf-container { height: 75vh; }
    .page-title { margin-left: 5px; font-size: 16px; }
}

@media (max-width: 600px) {
    .arkalogo-img, .logo-img {
        display: none !important;
    }
    
    .logo3-img {
        display: block !important;
        position: absolute;

        right: 125px;
        height: 25px;
        width: auto;

    }

    .logo-area {
        padding-left: 70px;
    }

    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; }
    .card { min-height: auto; }
}
    
</style>

<script>
// ALT MENÜLERİ AÇIP KAPATAN FONKSİYON
function toggleSubmenu(id) {
    const sub = document.getElementById(id);
    if (sub.style.display === "block") {
        sub.style.display = "none";
    } else {
        sub.style.display = "block";
    }
}

function showVerification() {
    document.getElementById('pdfContent').style.display = 'none';
    document.getElementById('verifBox').style.display = 'block';
    document.getElementById('mainCard').style.minHeight = '300px';
}

function checkCode() {
    const code = document.getElementById('vCode').value;
    if(code === "1122334455") {
        document.getElementById('verifBox').style.display = 'none';
        document.getElementById('pdfContent').style.display = 'block';
        document.getElementById('mainCard').style.minHeight = '700px';
        document.getElementById('vCode').value = ""; 
    } else {
        alert("Geçersiz doğrulama kodu!");
    }
}

function toggleMenu() {
    const slideMenu = document.getElementById('slideMenu');
    if (window.innerWidth <= 1000) {
        slideMenu.classList.toggle('active');
    }
}

window.addEventListener('resize', function() {
    if (window.innerWidth > 1000) {
        document.getElementById('slideMenu').classList.remove('active');
    }
});
</script>
