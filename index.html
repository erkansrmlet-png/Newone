<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; /* Sayfa arka planı hafif gri */
    color: #444;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 0 20px; /* Sağ padding'i 0 yaptık ki logo yapışsın */
    color: #fff;
    position: relative;
    z-index: 100;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 85px; 
    font-size: 16px;
    font-weight: 500;
}

/* LOGO KONUMU - DOKUNULMADI */
.logo-img {
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 15px;
    height: 100%; /* Logonun tam dikey oturması için */
}

/* YENİ EKLENEN SAĞ LOGO AYARI */
.logo2-img {
    height: 70px; /* Header yüksekliği ile aynı */
    width: auto;
    display: block;
}

.ed-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start; 
}

/* SOL MENÜ ÇERÇEVESİ (AYRI KART GÖRÜNÜMÜ) */
.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
    
    margin-top: 3px;   
    margin-left: -2px; 
}

.sidebar-img {
    width: 100%;
    display: block;
    position: relative;
    top: 0px;  
    left: 0px; 
}

/* İÇERİK ALANI */
.content {
    flex: 1;
}

.page-title {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    letter-spacing: 0.15px; 
    margin-top: 8.5px; 
    margin-left: -6px; 
    text-transform: uppercase;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    margin-top: 8px; 
    margin-left: -7px; 
    width: 97%;          
}

/* PNG BUTON YENİ AYARLARI */
.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    height: auto;
    position: relative;
    top: -7.8px; 
    left: 1px; 
    margin-bottom: 5px; 
}

/* AYIRICI BAR */
.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

/* PDF ÖNİZLEME ALANI */
.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 5px;
    right: 15px;
    font-size: 11px;
    color: #999;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        SAMANDAĞ BELEDİYESİ <span style="margin-left:10px; font-weight:300; opacity:0.9;"></span>
    </div>

    <div class="header-right">
        <button class="ed-btn">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600;">➔ ÜYE GİRİŞİ</span>
        <img src="logo2.png" alt="Logo 2" class="logo2-img">
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" class="y-buton-img">
            <div class="separator-bar"></div>
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>
        </div>
    </div>
</div>

<div class="footer">SÜRÜM 2.0.888</div>

</body>
</html>
