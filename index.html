<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samandağ Belediyesi - Resmi Web Sitesi</title>
    <style>
        /* Temel Sıfırlama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f8;
        }

        /* Üst Bar Tasarımı - Logo ile Tam Uyumlu */
        header {
            /* Logonun ana arka plan rengi */
            background-color: #3b4252; 
            height: 90px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            /* Logonun altındaki altın/bej çizgi */
            border-bottom: 5px solid #8e7c5e; 
        }

        /* Logonun altındaki gölge efekti (Görseldeki geçiş) */
        header::after {
            content: "";
            position: absolute;
            bottom: -15px; /* Çizginin hemen altına */
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            pointer-events: none;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 50px;
        }

        /* Logo Alanı - Sol Köşeye Sıfır */
        .logo-box {
            height: 95px; /* Header yüksekliğiyle aynı */
            display: flex;
            align-items: center;
        }

        .logo-box img {
            height: 100%; /* Barı dikeyde tam doldurur */
            width: auto;
            display: block;
        }

        /* Navigasyon Menüsü */
        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            /* Logodaki açık mavi tonu */
            color: #8ed0d4; 
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s ease;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(142, 208, 212, 0.6);
        }

        /* Sayfa İçeriği Test Alanı */
        main {
            padding: 80px 20px;
            text-align: center;
        }

        .intro {
            background: white;
            padding: 60px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #3b4252;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo-box">
                <img src="logo.png" alt="Samandağ Belediyesi Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Kurumsal</a></li>
                    <li><a href="#">Hizmetler</a></li>
                    <li><a href="#">Projeler</a></li>
                    <li><a href="#">İletişim</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="intro">
            <h1>Kurumsal Arayüz Tasarımı</h1>
            <p>Üst barın altındaki altın rengi şerit ve gölge geçişi, logo görselindeki detaylarla birebir eşleşecek şekilde ayarlandı.</p>
        </div>
    </main>

</body>
</html>
