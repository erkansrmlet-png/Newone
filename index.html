<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 280px; 
    font-size: 16px;
    font-weight: 500;
    flex-grow: 1;
}

.logo-img, .logo3-img {
    position: absolute;
    top: -30px;
    left: -20px;
    height: 88px;
    z-index: 100;
}

.arkalogo-img {
    position: absolute;
    top: -30px;
    left: 1250px; 
    height: 88px;
    z-index: 999; 
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 1002;
}

.header-icons img {
    height: 25px; 
    cursor: pointer;
}

/* ANA YAPI - DÜZELTİLDİ */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    max-width: 1300px; /* Sayfanın çok yayılmasını önler */
    margin: 0 auto;    /* Ortalar */
    box-sizing: border-box;
}

.sidebar {
    width: 236px; 
    flex-shrink: 0;
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; }

.content { 
    flex: 1; 
    min-width: 0; /* Taşıyıcıyı içeriğe göre daraltır */
}

/* ÇERÇEVE VE EVRAK ALANI - TAM ORANTILI */
.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    border: 1px solid #eee;
    width: 100%;       /* Sabit yüzde yerine tam uyum */
    box-sizing: border-box; 
    margin-top: 10px;
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: 100%;       /* Dışarı taşmaması için 100% yaptık */
    margin: 15px 0;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* MOBİL PDF UYARISI */
.mobile-pdf-warning {
    display: none;
    padding: 20px;
    background: #f8f9fa;
    border-radius: 4px;
    text-align: center;
}

/* MOBİL MENÜ BUTONU */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    z-index: 9999;
}
.mobile-menu-btn span { width: 25px; height: 3px; background: #fff; border-radius: 2px; }

/* MEDYA SORGULARI */
@media (max-width: 1000px) {
    .logo-img, .arkalogo-img, .header-right button, .header-right span { display: none !important; }
    .logo3-img { display: block !important; }
    .logo-area { padding-left: 80px; }
    
    .header-icons {
        position: absolute;
        right: 60px;
    }
    .mobile-menu-btn { display: flex !important; position: absolute; right: 20px; }
    
    .main { flex-direction: column; padding: 15px; }
    .sidebar { width: 100%; display: none; } /* Mobilde sidebar gizli, menü açınca gelmeli */
    .sidebar.open { display: block; }
}

@media (max-width: 600px) {
    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; }
    .card { padding: 15px; }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="arkalogo.png" class="arkalogo-img">
        <img src="logo3.png" class="logo3-img">
        SAMANDAĞ BELEDİYESİ
    </div>

    <div class="header-right">
        <button class="ed-btn" style="background: #e74c3c; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; font-weight:600; color:#fff; cursor:pointer; margin-left: 10px;">➔ ÜYE GİRİŞİ</span>
        
        <div class="header-icons" style="margin-left: 20px;">
            <img src="edevlet.png" alt="e-Devlet" style="height:25px;">
            <img src="uyegirisi.png" alt="Üye Girişi" style="height:25px; margin-left:10px;">
        </div>
    </div>

    <div class="mobile-menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>

<div class="main">
    <div class="sidebar" id="mobileSidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title" style="color: #6c757d; font-weight: 350; text-transform: uppercase;">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" style="width: 111.5px; cursor: pointer; display: block;">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>

            <div class="mobile-pdf-warning">
                Bu tarayıcı PDF görüntülemeyi desteklemiyor. <br><br>
                <a href="Evrak.pdf" target="_blank" style="color: #337ab7; font-weight: bold; text-decoration: none;">
                    Evrağı İndirmek İçin Tıklayın
                </a>
            </div>
        </div>
    </div>
</div>

<div class="footer" style="position: fixed; bottom: 5px; right: 15px; font-size: 11px; color: #999;">SÜRÜM 2.0.888</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById('mobileSidebar');
    sidebar.style.display = (sidebar.style.display === 'block') ? 'none' : 'block';
}
</script>

</body>
</html>
