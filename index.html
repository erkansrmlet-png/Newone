<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Emlak Vergisi</title>

<style>
@page {
    size: A4;
    margin: 0;
}

.logo {
    position: absolute;   /* #page divine göre konumlanacak */
    top: 0;               /* #page’in üstünden başla */
    left: 0;              /* #page’in solundan başla */
    width: 30mm;          /* logo genişliği */
    height: 30mm;         /* logo yüksekliği */
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

body {
    margin: 0;
    background: #ccc;
    font-family: Arial, Helvetica, sans-serif;
}

#page {
    width: 210mm;
    height: 297mm;
    background: white;
    margin: auto;
    padding: 8mm;
    box-sizing: border-box;
    position: relative;
}

/* GENEL */
.small { font-size: 9px; }
.normal { font-size: 10px; }
.bold { font-weight: bold; }
.center { text-align: center; }
.right { text-align: right; }

/* KUTU */
.box {
    border: 1px solid #000;
    padding: 2px 4px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}

/* FLEX SATIR */
.row {
    display: flex;
    gap: 2mm;
    margin-bottom: 2mm;
}

/* INPUT */
input {
    width: 100%;
    border: none;
    font-size: 10px;
    outline: none;
    height: 100%;
    box-sizing: border-box;
}

/* TABLO */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 9px;
}

td, th {
    border: 1px solid #000;
    padding: 2px;
    vertical-align: middle;
}

/* DİKEY YAZI */
.vertical {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-align: center;
}

/* BAŞLIK */
.title {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
}

.subtitle {
    font-size: 11px;
    text-align: center;
    margin-bottom: 3mm;
}

/* QR */
.qr {
    position: absolute;
    right: 8mm;
    top: 8mm;
    width: 25mm;
    height: 25mm;
    border: 1px solid #000;
}
</style>
</head>

<body>

<div class="logo">
    <img src="logo.png" alt="Logo">
</div>

<div id="page">

<div class="title">EMLAK VERGİSİ BİLDİRİMİ</div>
<div class="subtitle">MESKEN / BİNA</div>

<div class="qr"></div>

<!-- ÜST SATIR -->
<div class="row">

<!-- ADRES -->

<!-- TABLO -->

<br>

</div>

<div class="row">
    <div class="box small" style="flex:1; height:10mm;">Ünvan: <input value="ŞEF"></div>
</div>

</div>

</body>
</html>
