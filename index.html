<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Evrak</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  background:#ccc;
  font-family:Arial;
}

/* BUTON */
.controls{
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:10px;
  z-index:999;
}

/* A4 */
#page{
  width:210mm;
  height:297mm;
  margin:80px auto;
  position:relative;
  background:url('evrak.png') no-repeat center;
  background-size:100% 100%;
}

/* YAZI ALANLARI */
.field{
  position:absolute;
  font-size:12px;
  outline:none;
}

/* örnek alanlar */
#ad{ top:55mm; left:40mm; width:60mm; }
#soyad{ top:55mm; left:110mm; width:60mm; }

#tc{ top:45mm; left:40mm; width:80mm; }

/* tablo örnek */
#alan1{ top:120mm; left:60mm; width:40mm; }
#alan2{ top:120mm; left:110mm; width:40mm; }

</style>
</head>

<body>

<div class="controls">
<button onclick="pdf()">PDF indir</button>
<button onclick="jpg()">JPG indir</button>
</div>

<div id="page">

<div id="tc" class="field" contenteditable></div>
<div id="ad" class="field" contenteditable></div>
<div id="soyad" class="field" contenteditable></div>

<div id="alan1" class="field" contenteditable>720,55</div>
<div id="alan2" class="field" contenteditable>720,55</div>

</div>

<script>
function pdf(){
  html2pdf().set({
    margin:0,
    filename:'evrak.pdf',
    html2canvas:{scale:3},
    jsPDF:{unit:'mm',format:'a4'}
  }).from(document.getElementById("page")).save();
}

function jpg(){
  html2canvas(document.getElementById("page"),{scale:3}).then(c=>{
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="evrak.jpg";
    a.click();
  });
}
</script>

</body>
</html>
