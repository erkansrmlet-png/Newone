<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; /* Sayfa arka planı hafif gri */
    color: #444;
}

/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: #fff;
    position: relative;
    z-index: 100;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 85px; 
    font-size: 16px;
    font-weight: 500;
}

/* LOGO KONUMU - DOKUNULMADI */
.logo-img {
    position: absolute;
    top: -27px;
    left: -20px;
    height: 78px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.ed-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;     
    align-items: flex-start; 
}

/* SOL MENÜ ÇERÇEVESİ (AYRI KART GÖRÜNÜMÜ) */
.sidebar {
    width: 236px; 
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;

    /* --- HAREKET ETTİRME KOMUTLARI --- */
    
    margin-top: 3px;   /* YUKARI ALMAK İÇİN: Eksi (-) değer ver. (Örn: -10px, -20px) */
    /* margin-top: 20px; */ /* AŞAĞI ALMAK İÇİN: Artı (+) değer ver. */

    margin-left: -2px;  /* SAĞA ALMAK İÇİN: Artı (+) değer ver. */
    /* margin-left: -10px; */ /* SOLA ALMAK İÇİN: Eksi (-) değer ver. */
}

.sidebar-img {
    width: 100%;
    display: block;
    position: relative;
    /* GÖRSELİ BURADAN OYNATABİLİRSİN: */
    top: 0px;  
    left: 0px; 
}

/* İÇERİK ALANI */
.content {
    flex: 1;
}

.page-title {
    font-size: 20px;
    color: #888;
    margin-bottom: 12px;
    font-weight: 300;
    text-transform: uppercase;
}

.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
}

/* TURKUAZ BUTON */
.new-btn {
    background: #17a2b8;
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* PDF ÖNİZLEME ALANI */
.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 5px;
    right: 15px;
    font-size: 11px;
    color: #999;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        SAMANDAĞ BELEDİYESİ <span style="margin-left:10px; font-weight:300; opacity:0.9;">
    </div>

    <div class="header-right">
        <button class="ed-btn">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600;">➔ ÜYE GİRİŞİ</span>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <button class="new-btn">✚ Yeni Sorgu</button>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>
        </div>
    </div>
</div>

<div class="footer">SÜRÜM 2.0.888</div>

</body>
</html>
