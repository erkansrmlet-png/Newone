<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Hizmet Sayfası</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
}

/* HEADER */
.header{
background:#3f4554;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
}

.header-right{
display:flex;
align-items:center;
gap:15px;
}

.btn{
padding:8px 14px;
border:none;
border-radius:4px;
cursor:pointer;
}

.btn-red{
background:#e74c3c;
color:white;
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#ffffff;
height:calc(100vh - 60px);
border-right:1px solid #ddd;
padding-top:10px;
}

.menu-item{
padding:12px 20px;
color:#555;
cursor:pointer;
}

.menu-item:hover{
background:#f0f0f0;
}

.menu-active{
background:#e9ecef;
border-left:4px solid #3498db;
}

/* CONTENT */
.content{
flex:1;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
height:600px;
}

.title{
font-size:20px;
margin-bottom:15px;
color:#555;
}

.btn-blue{
background:#1abc9c;
color:white;
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <div style="width:40px;height:40px;background:#1abc9c;border-radius:50%"></div>
        SAMANDAĞ BELEDİYESİ - E-HİZMET SAYFASI
    </div>

    <div class="header-right">
        <button class="btn btn-red">e-Devlet ile Giriş Yap</button>
        <span>ÜYE GİRİŞİ</span>
    </div>
</div>

<div class="container">

    <div class="sidebar">
        <div class="menu-item">Ana Sayfa</div>
        <div class="menu-item">Borç Ödeme</div>
        <div class="menu-item">Ödemelerim</div>
        <div class="menu-item">Emlak Vergisi</div>
        <div class="menu-item">Çevre Temizlik Vergisi</div>
        <div class="menu-item">İlan Reklam Vergisi</div>
        <div class="menu-item">Kira Sözleşmelerim</div>
        <div class="menu-item">Sorgulama</div>
        <div class="menu-item">Başvurular</div>
        <div class="menu-item menu-active">Belge Doğrulama</div>
        <div class="menu-item">Yapı Ruhsatı Ön Onayları</div>
    </div>

    <div class="content">
        <div class="card">
            <div class="title">BELGE DOĞRULAMA</div>
            <button class="btn-blue">← Yeni Sorgu</button>
        </div>
    </div>

</div>

</body>
</html>
